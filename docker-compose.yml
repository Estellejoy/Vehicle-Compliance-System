services:
  app:
    build: .
    container_name: vehicle-compliance-app
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: vehicle_compliance
      DB_USER: vcs_user
      DB_PASSWORD: vcs_password
      DB_CHARSET: utf8mb4
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /var/www/html/backend
        - action: sync
          path: ./config
          target: /var/www/html/config
        - action: sync
          path: ./views
          target: /var/www/html/views
        - action: sync
          path: ./assets
          target: /var/www/html/assets
        - action: sync
          path: ./index.php
          target: /var/www/html/index.php
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./docker-compose.yml

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: vehicle-compliance-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
      PMA_ARBITRARY: 0
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: vehicle-compliance-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: vehicle_compliance
      MYSQL_USER: vcs_user
      MYSQL_PASSWORD: vcs_password
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
